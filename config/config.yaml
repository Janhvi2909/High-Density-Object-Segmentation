# High-Density Object Segmentation Configuration

# =============================================================================
# Data Configuration
# =============================================================================
data:
  dataset: "sku110k"
  root_dir: "data/raw"
  processed_dir: "data/processed"

  # Train/Val/Test splits
  train_split: 0.8
  val_split: 0.1
  test_split: 0.1

  # Image preprocessing
  image_size: [640, 640]  # (height, width)
  normalize:
    mean: [0.485, 0.456, 0.406]
    std: [0.229, 0.224, 0.225]

  # Augmentation
  augmentation:
    enabled: true
    horizontal_flip: 0.5
    vertical_flip: 0.0
    rotation: 15
    scale: [0.8, 1.2]
    brightness: 0.2
    contrast: 0.2
    mosaic: 0.5

# =============================================================================
# Model Configuration
# =============================================================================
models:
  # Baseline ML
  baseline:
    thresholding:
      block_size: 11
      constant: 2
    edge_detection:
      canny_low: 50
      canny_high: 150

  # Advanced ML
  advanced:
    watershed:
      distance_threshold: 0.7
      marker_size: 3
    gmm:
      n_components: 5
      covariance_type: "full"
    slic:
      n_segments: 500
      compactness: 10

  # YOLOv8
  yolov8:
    model_size: "m"  # n, s, m, l, x
    pretrained: true
    conf_threshold: 0.25
    iou_threshold: 0.45

  # Mask R-CNN
  maskrcnn:
    backbone: "resnet50_fpn"
    pretrained: true
    num_classes: 2  # background + object
    min_size: 640
    max_size: 1024
    rpn:
      anchor_sizes: [[32], [64], [128], [256], [512]]
      aspect_ratios: [[0.5, 1.0, 2.0]]

  # Segment Anything Model
  sam:
    model_type: "vit_b"  # vit_b, vit_l, vit_h
    checkpoint: "checkpoints/sam_vit_b.pth"
    points_per_side: 32
    pred_iou_thresh: 0.88

  # Hybrid Model
  hybrid:
    density_threshold: 50  # objects per 640x640 region
    low_density_model: "yolov8"
    high_density_model: "maskrcnn"
    use_sam_refinement: true
    ensemble_weights:
      yolov8: 0.4
      maskrcnn: 0.6

# =============================================================================
# Training Configuration
# =============================================================================
training:
  # General
  epochs: 100
  batch_size: 16
  num_workers: 4
  seed: 42

  # Optimizer
  optimizer:
    name: "adamw"
    lr: 0.001
    weight_decay: 0.0001
    momentum: 0.9  # for SGD

  # Learning rate scheduler
  scheduler:
    name: "cosine"  # step, cosine, plateau
    warmup_epochs: 5
    min_lr: 0.00001

  # Loss
  loss:
    classification: "focal"  # cross_entropy, focal
    segmentation: "dice"  # bce, dice, combined
    focal_alpha: 0.25
    focal_gamma: 2.0

  # Checkpointing
  checkpoint_dir: "checkpoints"
  save_best_only: true
  save_frequency: 10

  # Early stopping
  early_stopping:
    enabled: true
    patience: 15
    metric: "val_mAP"
    mode: "max"

# =============================================================================
# Evaluation Configuration
# =============================================================================
evaluation:
  # Metrics
  metrics:
    - "mAP@0.5"
    - "mAP@0.5:0.95"
    - "precision"
    - "recall"
    - "f1_score"
    - "iou"

  # Density analysis
  density_buckets:
    - [1, 20]      # Low density
    - [21, 50]     # Medium density
    - [51, 100]    # High density
    - [101, 200]   # Very high density

  # Failure analysis
  failure_analysis:
    enabled: true
    save_examples: true
    num_examples: 50
    categories:
      - "false_positives"
      - "false_negatives"
      - "occlusion_failures"
      - "small_object_failures"
      - "boundary_errors"

# =============================================================================
# Inference Configuration
# =============================================================================
inference:
  batch_size: 1
  conf_threshold: 0.5
  nms_threshold: 0.4
  max_detections: 300

  # Visualization
  visualization:
    draw_boxes: true
    draw_masks: true
    mask_alpha: 0.5
    color_palette: "tab20"

# =============================================================================
# Robustness Analysis
# =============================================================================
robustness:
  corruptions:
    - name: "gaussian_noise"
      severity: [1, 2, 3, 4, 5]
    - name: "blur"
      severity: [1, 2, 3, 4, 5]
    - name: "brightness"
      severity: [1, 2, 3, 4, 5]
    - name: "contrast"
      severity: [1, 2, 3, 4, 5]
    - name: "jpeg"
      severity: [1, 2, 3, 4, 5]

# =============================================================================
# Demo Configuration
# =============================================================================
demo:
  gradio:
    server_name: "0.0.0.0"
    server_port: 7860
    share: false
    title: "High-Density Object Segmentation Demo"
    description: "Upload an image to segment densely packed objects"

# =============================================================================
# Logging Configuration
# =============================================================================
logging:
  level: "INFO"
  log_dir: "logs"
  use_wandb: false
  wandb_project: "high-density-segmentation"
